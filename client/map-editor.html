<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boxfury · Map Editor</title>
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      .editor {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-rows: auto 1fr auto;
        background: var(--bf-deep);
        color: var(--bf-bone);
        font-family: var(--font-display);
        gap: 12px;
        padding: 16px;
      }
      .editor__bar {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }
      .editor__title {
        font-weight: 700;
        font-size: 18px;
        margin-right: auto;
      }
      .editor__palette {
        display: flex;
        gap: 6px;
      }
      .palette__btn {
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bf-arena);
        border: 1.5px solid var(--bf-line);
        color: var(--bf-bone);
        font-family: var(--font-mono);
        font-weight: 700;
        font-size: 18px;
        cursor: pointer;
        border-radius: var(--r-tight);
      }
      .palette__btn.is-active {
        border-color: var(--p1);
        background: rgba(78, 224, 138, 0.18);
      }
      .editor__tools {
        display: flex;
        gap: 6px;
      }
      .tool {
        background: transparent;
        border: 1.5px solid var(--bf-mute);
        color: var(--bf-bone);
        padding: 8px 12px;
        font-family: var(--font-mono);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        cursor: pointer;
        border-radius: var(--r-tight);
      }
      .tool:hover { border-color: var(--bf-bone); }
      .tool--primary { background: var(--bf-bone); color: var(--bf-deep); border-color: var(--bf-bone); }
      .editor__size { display: flex; gap: 8px; align-items: center; font-family: var(--font-mono); font-size: 12px; color: var(--bf-soft); }
      .editor__size input {
        background: var(--bf-arena);
        border: 1px solid var(--bf-line);
        color: var(--bf-bone);
        font-family: var(--font-mono);
        font-size: 12px;
        padding: 4px 8px;
        width: 56px;
        border-radius: var(--r-tight);
      }
      .editor__canvas-wrap {
        overflow: auto;
        background: var(--bf-void);
        border: 1px solid var(--bf-line);
        border-radius: var(--r-tight);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      #editor-canvas {
        image-rendering: pixelated;
        cursor: crosshair;
      }
      .editor__io {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        align-items: stretch;
      }
      .editor__textarea {
        background: var(--bf-arena);
        border: 1px solid var(--bf-line);
        color: var(--bf-bone);
        font-family: var(--font-mono);
        font-size: 11px;
        padding: 10px 12px;
        white-space: pre;
        overflow: auto;
        resize: vertical;
        min-height: 120px;
        max-height: 240px;
        border-radius: var(--r-tight);
        line-height: 1.4;
      }
      .editor__io-actions { display: flex; flex-direction: column; gap: 6px; }
      .editor__hint {
        font-family: var(--font-mono);
        font-size: 10px;
        color: var(--bf-soft);
        margin-top: 6px;
      }
    </style>
  </head>
  <body>
    <div class="editor">
      <div class="editor__bar">
        <span class="editor__title">◣ MAP EDITOR</span>
        <div class="editor__palette" id="palette"></div>
        <div class="editor__size">
          <label>Cols <input id="size-cols" type="number" min="10" max="120" value="53" /></label>
          <label>Rows <input id="size-rows" type="number" min="6" max="40" value="15" /></label>
          <button class="tool" id="apply-size">Apply</button>
        </div>
        <div class="editor__tools">
          <button class="tool" id="btn-fill-floor">Floor row</button>
          <button class="tool" id="btn-clear">Clear</button>
          <button class="tool" id="btn-load">Load from text</button>
          <button class="tool tool--primary" id="btn-export">Export .txt</button>
        </div>
      </div>

      <div class="editor__canvas-wrap">
        <canvas id="editor-canvas"></canvas>
      </div>

      <div class="editor__io">
        <textarea id="map-text" class="editor__textarea" spellcheck="false"></textarea>
        <div class="editor__io-actions">
          <button class="tool" id="btn-copy">Copy</button>
          <span class="editor__hint">. empty&nbsp;&nbsp;= platform&nbsp;&nbsp;# solid wall&nbsp;&nbsp;J jade base&nbsp;&nbsp;C crimson base&nbsp;&nbsp;F flag</span>
        </div>
      </div>
    </div>
    <script type="module" src="/src/map-editor.js"></script>
  </body>
</html>
